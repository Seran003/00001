<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xmechanicals MVP Hub</title>
    <style>
      :root {
        --bg: #f4f6fa;
        --panel: #ffffff;
        --text: #1f2a3d;
        --muted: #5a667d;
        --primary: #2d5bff;
        --border: #d9e1f0;
        --ok: #0f8f4d;
        --warn: #c27300;
        --shadow: 0 6px 18px rgba(35, 52, 87, 0.08);
      }

      * { box-sizing: border-box; }
      body { margin: 0; font-family: Arial, Helvetica, sans-serif; color: var(--text); background: var(--bg); }
      .app-shell { max-width: 1200px; margin: 0 auto; padding: 24px; }
      .header-card {
        background: linear-gradient(135deg, #2d5bff 0%, #4a74ff 100%);
        border-radius: 16px; color: #fff; padding: 22px; box-shadow: var(--shadow);
      }
      .header-card h1 { margin: 0; font-size: 24px; }
      .header-card p { margin: 8px 0 0; opacity: 0.95; }
      .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 16px; box-shadow: var(--shadow); margin-top: 14px; }
      .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; margin-top: 14px; }
      .muted { color: var(--muted); }
      .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
      button { border-radius: 10px; border: 1px solid transparent; padding: 10px 14px; font-weight: 600; cursor: pointer; }
      .btn-primary { background: var(--primary); color: #fff; }
      .btn-outline { background: #fff; color: var(--primary); border-color: var(--primary); }
      .btn-neutral { background: #fff; color: var(--text); border-color: var(--border); }
      .table-wrap { margin-top: 12px; overflow: auto; border: 1px solid var(--border); border-radius: 12px; }
      table { width: 100%; border-collapse: collapse; background: #fff; }
      th, td { text-align: left; padding: 10px; border-bottom: 1px solid var(--border); font-size: 14px; }
      th { background: #f9fbff; }
      .badge { display: inline-block; font-size: 12px; padding: 4px 8px; border-radius: 999px; font-weight: 600; }
      .badge-draft { background: #eef1f6; color: #4e5a71; }
      .badge-progress { background: #e7edff; color: #3857c8; }
      .badge-complete { background: #e8f8ef; color: var(--ok); }
      .badge-warn { background: #fff4dd; color: var(--warn); }
      .modal-backdrop {
        position: fixed; inset: 0; background: rgba(20, 29, 46, 0.55);
        display: none; align-items: center; justify-content: center; padding: 14px;
      }
      .modal {
        width: min(560px, 100%); background: #fff; border-radius: 14px;
        border: 1px solid var(--border); box-shadow: var(--shadow); padding: 18px;
      }
      .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
      .field label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
      .field input, .field select, .field textarea {
        border: 1px solid var(--border); background: #fff; border-radius: 10px; padding: 10px; font-size: 14px;
      }
      textarea { min-height: 80px; resize: vertical; }
      pre { background: #111827; color: #e5e7eb; padding: 10px; border-radius: 10px; overflow: auto; }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <section class="header-card">
        <h1>Xmechanicals MVP Hub</h1>
        <p>
          Internal workflow app (monolith): Bid -> Assignment -> Project -> Phase -> Work Order -> Schedule
        </p>
      </section>
      <main id="app"></main>
    </div>

    <div class="modal-backdrop" id="modalBackdrop">
      <div class="modal" id="modalContent"></div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
